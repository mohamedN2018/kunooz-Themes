<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كنوز</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        .dark-mode-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white dark:bg-gray-900 z-[9999] flex items-center justify-center transition-all duration-500 ease-out">
        <div class="text-center">
            <div class="relative w-24 h-24 mx-auto mb-6">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full animate-ping opacity-75"></div>
                <div class="relative w-20 h-20 mx-auto mt-2 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg">
                    <i class="fas fa-book-open text-white text-3xl animate-pulse"></i>
                </div>
            </div>
            <div class="text-2xl font-bold text-gray-800 dark:text-white mb-2 animate-pulse">كنوز</div>
            <div class="text-gray-600 dark:text-gray-300">جاري تحميل المحتوى...</div>
        </div>
    </div>

    <!-- زر Dark Mode -->
    <button class="dark-mode-toggle" id="darkModeToggle">
        <i class="fas fa-moon"></i>
        <span class="tooltip hidden md:inline-block absolute right-14 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition">الوضع الداكن</span>
    </button>

    <!-- زر العودة للأعلى -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
        <span class="tooltip hidden md:inline-block absolute right-14 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition">العودة للأعلى</span>
    </button>

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html"><img src="assets/images/logo.png" class="h-12" alt="كنوز"></a>
            <button class="text-gray-700 dark:text-gray-300 text-2xl" id="closeMobileMenu"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <a href="index.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-home ml-2"></i> الرئيسية</a>
            <a href="category-courses.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-video ml-2"></i> الكورسات</a>
            <a href="category-articles.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-newspaper ml-2"></i> المقالات</a>
            <a href="category-grants.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-award ml-2"></i> المنح والتدريبات</a>
            <a href="category-books.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-book ml-2"></i> الكتب والملخصات</a>
            <a href="dashboard.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-tachometer-alt ml-2"></i> لوحة التحكم</a>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html"><img src="assets/images/logo.png" class="h-16" alt="كنوز"></a>
            <button class="md:hidden text-xl" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="hover:text-blue-600 font-medium">الرئيسية</a>
                <a href="category-courses.html" class="hover:text-blue-600 font-medium">الكورسات</a>
                <a href="category-articles.html" class="hover:text-blue-600 font-medium">المقالات</a>
                <a href="category-grants.html" class="hover:text-blue-600 font-medium">المنح والتدريبات</a>
                <a href="category-books.html" class="hover:text-blue-600 font-medium">الكتب والملخصات</a>
            </div>
            <div class="hidden md:flex items-center space-x-4">
                <div class="relative">
                    <button id="user-menu-btn" class="flex items-center space-x-2">
                        <div class="w-9 h-9 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold">ز</div>
                        <span>زائر</span>
                        <i class="fas fa-chevron-down text-sm"></i>
                    </button>
                    <div id="user-menu" class="absolute left-0 mt-3 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-2xl py-2 opacity-0 invisible scale-95 transition-all duration-200 z-50">
                        <a href="login.html" class="block px-4 py-2 hover:bg-gray-100"><i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول</a>
                        <a href="register.html" class="block px-4 py-2 hover:bg-gray-100"><i class="fas fa-user-plus ml-2"></i> إنشاء حساب</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4">
        <div class="max-w-md w-full space-y-8">
            <div>
                <div class="flex justify-center">
                    <div class="w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-2xl"></i>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-bold text-gray-900 dark:text-gray-100">تسجيل الدخول</h2>
            </div>
            
            <form class="mt-8 space-y-6" action="dashboard.html" method="post">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="username" class="sr-only">اسم المستخدم</label>
                        <input id="username" name="username" type="text" required class="appearance-none relative block w-full px-3 py-3 border border-gray-300 dark:border-gray-700 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-800 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="اسم المستخدم أو البريد الإلكتروني">
                    </div>
                    <div>
                        <label for="password" class="sr-only">كلمة المرور</label>
                        <input id="password" name="password" type="password" required class="appearance-none relative block w-full px-3 py-3 border border-gray-300 dark:border-gray-700 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-800 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="كلمة المرور">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="remember_me" class="mr-2 block text-sm text-gray-900 dark:text-gray-300">تذكرني</label>
                    </div>
                    <div class="text-sm">
                        <a href="password_reset.html" class="text-blue-600 dark:text-blue-400 hover:text-blue-800">نسيت كلمة المرور؟</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300">
                        <span class="absolute right-0 inset-y-0 flex items-center pr-3"><i class="fas fa-sign-in-alt"></i></span>
                        تسجيل الدخول
                    </button>
                </div>
            </form>
            
            <div class="text-center pt-6 border-t border-gray-200 dark:border-gray-700">
                <p class="text-gray-600 dark:text-gray-300 text-sm">ليس لديك حساب؟ <a href="register.html" class="text-blue-600 dark:text-blue-400 hover:text-blue-800">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 text-center">
        <p>© 2024 موقع كنوز. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        (function() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { setTimeout(()=>{ overlay.style.opacity='0'; setTimeout(()=>{ overlay.style.display='none'; },500); },100); }
            setTimeout(()=>{ const o=document.getElementById('loading-overlay'); if(o && o.style.display!=='none'){ o.style.opacity='0'; setTimeout(()=>{ o.style.display='none'; },500); } },2000);
        })();
        
        const btn = document.getElementById("user-menu-btn");
        const menu = document.getElementById("user-menu");
        btn?.addEventListener("click", (e) => { e.stopPropagation(); menu?.classList.toggle("opacity-0"); menu?.classList.toggle("invisible"); menu?.classList.toggle("scale-95"); });
        document.addEventListener("click", (e) => { if(btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) { menu.classList.add("opacity-0", "invisible", "scale-95"); } });
    </script>
</body>
</html>
