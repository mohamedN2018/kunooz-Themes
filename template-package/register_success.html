<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التسجيل بنجاح - كنوز</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="loading-overlay" class="fixed inset-0 bg-white dark:bg-gray-900 z-[9999] flex items-center justify-center transition-all duration-500 ease-out">
        <div class="text-center"><div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div><p class="mt-4">جاري التحميل...</p></div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html"><img src="assets/images/logo.png" class="h-12" alt="كنوز"></a>
            <button class="text-gray-700 dark:text-gray-300 text-2xl" id="closeMobileMenu"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <a href="index.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-home ml-2"></i> الرئيسية</a>
            <a href="category-courses.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-video ml-2"></i> الكورسات</a>
            <a href="category-articles.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-newspaper ml-2"></i> المقالات</a>
            <a href="category-grants.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-award ml-2"></i> المنح والتدريبات</a>
            <a href="category-books.html" class="block hover:text-blue-600 py-2 border-b"><i class="fas fa-book ml-2"></i> الكتب والملخصات</a>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html"><img src="assets/images/logo.png" class="h-16" alt="كنوز"></a>
            <button class="md:hidden text-xl" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="hover:text-blue-600 font-medium">الرئيسية</a>
                <a href="category-courses.html" class="hover:text-blue-600 font-medium">الكورسات</a>
                <a href="category-articles.html" class="hover:text-blue-600 font-medium">المقالات</a>
                <a href="category-grants.html" class="hover:text-blue-600 font-medium">المنح والتدريبات</a>
                <a href="category-books.html" class="hover:text-blue-600 font-medium">الكتب والملخصات</a>
            </div>
            <div class="hidden md:flex items-center space-x-4">
                <div class="relative">
                    <button id="user-menu-btn" class="flex items-center space-x-2">
                        <div class="w-9 h-9 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold">ز</div>
                        <span>زائر</span>
                        <i class="fas fa-chevron-down text-sm"></i>
                    </button>
                    <div id="user-menu" class="absolute left-0 mt-3 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-2xl py-2 opacity-0 invisible scale-95 transition-all duration-200 z-50">
                        <a href="login.html" class="block px-4 py-2 hover:bg-gray-100"><i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول</a>
                        <a href="register.html" class="block px-4 py-2 hover:bg-gray-100"><i class="fas fa-user-plus ml-2"></i> إنشاء حساب</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Register Success -->
    <div class="flex flex-col items-center justify-center min-h-screen py-12 px-4">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <div class="flex justify-center">
                    <div class="w-20 h-20 bg-gradient-to-r from-green-500 to-teal-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-check-circle text-white text-4xl"></i>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-gray-100">تم التسجيل بنجاح</h2>
                <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">تم تسجيلك بنجاح. يمكنك الان تسجيل الدخول.</p>
            </div>
            
            <div class="mt-8">
                <a href="login.html" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 transition duration-300">
                    <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول الآن
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-8 text-center"><p>© 2024 موقع كنوز. جميع الحقوق محفوظة.</p></footer>

    <script src="js/main.js"></script>
    <script>
        (function() { const o=document.getElementById('loading-overlay'); if(o){ setTimeout(()=>{ o.style.opacity='0'; setTimeout(()=>{ o.style.display='none'; },500); },100); } })();
        const btn = document.getElementById("user-menu-btn");
        const menu = document.getElementById("user-menu");
        btn?.addEventListener("click", (e) => { e.stopPropagation(); menu?.classList.toggle("opacity-0"); menu?.classList.toggle("invisible"); menu?.classList.toggle("scale-95"); });
        document.addEventListener("click", (e) => { if(btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) { menu.classList.add("opacity-0", "invisible", "scale-95"); } });
    </script>
</body>
</html>
